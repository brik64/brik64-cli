name: Deprecated - CLI npm publish disabled

on:
  workflow_dispatch:
    inputs:
      confirm_disabled_notice:
        description: "Type ACK_CLI_NPM_DISABLED to acknowledge this workflow is disabled"
        required: true
        type: string

permissions:
  contents: read

jobs:
  disabled:
    name: CLI npm publishing is disabled
    runs-on: ubuntu-latest
    steps:
      - name: Explain disabled channel
        shell: bash
        run: |
          set -euo pipefail
          echo "BRIK64 CLI beta4 and later are distributed by curl installer only."
          echo "Use https://brik64.com/cli/install.sh and GitHub Release assets."
          echo "npm is reserved for SDK packages such as @brik64/core."
          exit 1
