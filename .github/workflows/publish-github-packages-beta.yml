name: Deprecated - CLI GitHub Packages publish disabled

on:
  workflow_dispatch:
    inputs:
      confirm_disabled_notice:
        description: "Type ACK_CLI_GITHUB_PACKAGES_DISABLED to acknowledge this workflow is disabled"
        required: true
        type: string

permissions:
  contents: read

jobs:
  disabled:
    name: CLI GitHub Packages publishing is disabled
    runs-on: ubuntu-latest
    steps:
      - name: Explain disabled channel
        shell: bash
        run: |
          set -euo pipefail
          echo "BRIK64 CLI beta4 and later are distributed by curl installer only."
          echo "GitHub Packages is not a CLI distribution mirror for beta4."
          echo "npm-family registries are reserved for SDK packages."
          exit 1
