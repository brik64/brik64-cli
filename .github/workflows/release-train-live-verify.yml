name: Release train live verify

on:
  workflow_dispatch:
  schedule:
    - cron: "17 7 * * *"

permissions:
  contents: read

jobs:
  live-verify:
    name: Verify public release surfaces
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Verify live surfaces
        run: npm run release:train:live-verify

      - name: Upload live verification evidence
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: release-train-live-verify
          path: evidence/release-train-live-verify/report.json
