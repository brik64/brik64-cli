name: Release train publish plan

on:
  workflow_dispatch:
    inputs:
      manifest_digest:
        description: "Expected release manifest SHA-256"
        required: true
        type: string
      confirm:
        description: "Type PUBLISH <version> <manifest_digest> to pass publication preflight"
        required: true
        type: string
      execute_publication:
        description: "Execute publication after preflight. False keeps the workflow in dry-run mode."
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

jobs:
  publish-plan:
    name: Build fail-closed publication plan
    runs-on: ubuntu-latest
    env:
      BRIK64_GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.BRIK64_GCP_WORKLOAD_IDENTITY_PROVIDER }}
      BRIK64_GCP_SERVICE_ACCOUNT: ${{ secrets.BRIK64_GCP_SERVICE_ACCOUNT }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies when lockfile exists
        shell: bash
        run: |
          set -euo pipefail
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install --ignore-scripts --no-package-lock
          fi

      - name: Validate release train pre-publication
        env:
          GH_TOKEN: ${{ secrets.BRIK64_GITHUB_RELEASE_TOKEN }}
        run: npm run release:train:dry-run

      - name: Check requested manifest digest
        shell: bash
        run: |
          set -euo pipefail
          ACTUAL="$(node -e 'const fs=require("fs"),crypto=require("crypto"); process.stdout.write(crypto.createHash("sha256").update(fs.readFileSync("release/manifest.json","utf8")).digest("hex"))')"
          test "$ACTUAL" = "${{ inputs.manifest_digest }}"

      - name: Generate sync payload
        run: npm run release:train:sync-surfaces

      - name: Verify GitHub signed release commit
        env:
          GH_TOKEN: ${{ secrets.BRIK64_GITHUB_RELEASE_TOKEN }}
          BRIK64_RELEASE_COMMIT: ${{ github.sha }}
        run: npm run release:github-verified-signature

      - name: Prepare SDK publication workspaces
        env:
          BRIK64_GITHUB_RELEASE_TOKEN: ${{ secrets.BRIK64_GITHUB_RELEASE_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          SDK_ROOT="/Users/carlosjperez/Documents/GitHub"
          sudo mkdir -p "$SDK_ROOT"
          sudo chown -R "$USER:$USER" /Users/carlosjperez
          clone_or_update() {
            local repo="$1"
            local dir="$2"
            if [ -d "$dir/.git" ]; then
              git -C "$dir" fetch --depth=1 origin main
              git -C "$dir" checkout -f origin/main
            else
              git clone --depth=1 "https://x-access-token:${BRIK64_GITHUB_RELEASE_TOKEN}@github.com/brik64-admin/${repo}.git" "$dir"
            fi
          }
          clone_or_update brik64-lib-js "$SDK_ROOT/brik64-lib-js"
          clone_or_update brik64-lib-python "$SDK_ROOT/brik64-lib-python"
          clone_or_update brik64-lib-rust "$SDK_ROOT/brik64-lib-rust"

          cd "$SDK_ROOT/brik64-lib-js"
          if [ -f package-lock.json ]; then npm ci; else npm install --ignore-scripts --no-package-lock; fi
          npm run build
          VERSION="$(node -e 'const fs=require("fs"); process.stdout.write(JSON.parse(fs.readFileSync("package.json","utf8")).version)')"
          BETA_NUMBER="$(node -e 'const v=process.argv[1]; const m=v.match(/-beta\.(\d+)$/); if (!m) process.exit(1); process.stdout.write(m[1])' "$VERSION")"
          PACK_DIR="evidence-beta${BETA_NUMBER}-pack"
          mkdir -p "$PACK_DIR"
          npm pack --pack-destination "$PACK_DIR"

          cd "$SDK_ROOT/brik64-lib-python"
          python3 -m pip install --upgrade build twine
          python3 -m build

          cd "$SDK_ROOT/brik64-lib-rust"
          cargo package --allow-dirty

      - name: Prepare CLI package for manifest version
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(node -e 'const fs=require("fs"); process.stdout.write(JSON.parse(fs.readFileSync("release/manifest.json","utf8")).version)')"
          BETA_NUMBER="$(node -e 'const v=process.argv[1]; const m=v.match(/-beta\.(\d+)$/); if (!m) process.exit(1); process.stdout.write(m[1])' "$VERSION")"
          PACKAGE_SCRIPT="package:beta${BETA_NUMBER}:local"
          SMOKE_SCRIPT="smoke:beta${BETA_NUMBER}:package"
          npm run "$PACKAGE_SCRIPT"
          npm run "$SMOKE_SCRIPT"

      - name: Record beta9 staged SDK preflight
        env:
          BRIK64_RELEASE_PUBLICATION_IN_PROGRESS: "1"
          NODE_AUTH_TOKEN: ${{ secrets.BRIK64_NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.BRIK64_NPM_TOKEN }}
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.BRIK64_PYPI_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.BRIK64_CRATES_TOKEN }}
          BRIK64_NPM_TOKEN: ${{ secrets.BRIK64_NPM_TOKEN }}
          BRIK64_PYPI_TOKEN: ${{ secrets.BRIK64_PYPI_TOKEN }}
          BRIK64_CRATES_TOKEN: ${{ secrets.BRIK64_CRATES_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -f evidence/beta9-package/package.manifest.json ]; then
            npm run gate:beta9:sdk-marketplace-publish || true
            npm run gate:beta9:sdk-marketplaces || true
            npm run gate:beta9:manifest-drift
          fi

      - name: Authenticate to Google Cloud
        if: ${{ inputs.execute_publication == true && env.BRIK64_GCP_WORKLOAD_IDENTITY_PROVIDER != '' && env.BRIK64_GCP_SERVICE_ACCOUNT != '' }}
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ env.BRIK64_GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.BRIK64_GCP_SERVICE_ACCOUNT }}

      - name: Setup Google Cloud SDK
        if: ${{ inputs.execute_publication == true && env.BRIK64_GCP_WORKLOAD_IDENTITY_PROVIDER != '' && env.BRIK64_GCP_SERVICE_ACCOUNT != '' }}
        uses: google-github-actions/setup-gcloud@v3

      - name: Generate publication plan
        env:
          BRIK64_RELEASE_PUBLICATION_IN_PROGRESS: "1"
          GH_TOKEN: ${{ secrets.BRIK64_GITHUB_RELEASE_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.BRIK64_NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.BRIK64_NPM_TOKEN }}
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.BRIK64_PYPI_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.BRIK64_CRATES_TOKEN }}
          BRIK64_RELEASE_CONFIRM: ${{ inputs.confirm }}
          BRIK64_GITHUB_RELEASE_TOKEN: ${{ secrets.BRIK64_GITHUB_RELEASE_TOKEN }}
          BRIK64_GCP_RELEASE_CREDENTIALS: ${{ secrets.BRIK64_GCP_RELEASE_CREDENTIALS }}
          BRIK64_GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.BRIK64_GCP_WORKLOAD_IDENTITY_PROVIDER }}
          BRIK64_GCP_SERVICE_ACCOUNT: ${{ secrets.BRIK64_GCP_SERVICE_ACCOUNT }}
          BRIK64_NPM_TOKEN: ${{ secrets.BRIK64_NPM_TOKEN }}
          BRIK64_PYPI_TOKEN: ${{ secrets.BRIK64_PYPI_TOKEN }}
          BRIK64_CRATES_TOKEN: ${{ secrets.BRIK64_CRATES_TOKEN }}
          BRIK64_DOCS_DISPATCH_TOKEN: ${{ secrets.BRIK64_DOCS_DISPATCH_TOKEN }}
          BRIK64_WEB_DEPLOY_TOKEN: ${{ secrets.BRIK64_WEB_DEPLOY_TOKEN }}
          BRIK64_SKILLS_REPO_TOKEN: ${{ secrets.BRIK64_SKILLS_REPO_TOKEN }}
        run: |
          if [ "${{ inputs.execute_publication }}" = "true" ]; then
            npm run release:train:publish-plan -- --publish
          else
            npm run release:train:publish-plan
          fi

      - name: Execute publication train
        env:
          BRIK64_RELEASE_PUBLICATION_IN_PROGRESS: "1"
          GH_TOKEN: ${{ secrets.BRIK64_GITHUB_RELEASE_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.BRIK64_NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.BRIK64_NPM_TOKEN }}
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.BRIK64_PYPI_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.BRIK64_CRATES_TOKEN }}
          BRIK64_RELEASE_MANIFEST_DIGEST: ${{ inputs.manifest_digest }}
          BRIK64_GITHUB_RELEASE_TOKEN: ${{ secrets.BRIK64_GITHUB_RELEASE_TOKEN }}
          BRIK64_GCP_RELEASE_CREDENTIALS: ${{ secrets.BRIK64_GCP_RELEASE_CREDENTIALS }}
          BRIK64_GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.BRIK64_GCP_WORKLOAD_IDENTITY_PROVIDER }}
          BRIK64_GCP_SERVICE_ACCOUNT: ${{ secrets.BRIK64_GCP_SERVICE_ACCOUNT }}
          BRIK64_NPM_TOKEN: ${{ secrets.BRIK64_NPM_TOKEN }}
          BRIK64_PYPI_TOKEN: ${{ secrets.BRIK64_PYPI_TOKEN }}
          BRIK64_CRATES_TOKEN: ${{ secrets.BRIK64_CRATES_TOKEN }}
          BRIK64_DOCS_DISPATCH_TOKEN: ${{ secrets.BRIK64_DOCS_DISPATCH_TOKEN }}
          BRIK64_WEB_DEPLOY_TOKEN: ${{ secrets.BRIK64_WEB_DEPLOY_TOKEN }}
          BRIK64_SKILLS_REPO_TOKEN: ${{ secrets.BRIK64_SKILLS_REPO_TOKEN }}
        run: |
          if [ "${{ inputs.execute_publication }}" = "true" ]; then
            npm run release:train:publish-execute -- --publish
          else
            npm run release:train:publish-execute
          fi

      - name: Upload publication planning evidence
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: release-train-publish-plan
          path: |
            evidence/release-train-sync/changelog.md
            evidence/release-train-sync/sync-payload.json
            evidence/release-train-sync/report.json
            evidence/beta9-public-surfaces/sdk-marketplace-publish.json
            evidence/release-github-verified-signature/report.json
            evidence/release-web-surface-sync/report.json
            evidence/release-train-live-verify/report.json
            evidence/release-train-publish-plan/report.json
            evidence/release-train-publish-execute/report.json
