name: Release train dry run

on:
  pull_request:
    paths:
      - "release/manifest.json"
      - "scripts/release-*.js"
      - "scripts/beta10-*.js"
      - "scripts/beta10-*.sh"
      - "scripts/build-beta10-package.sh"
      - "docs/BETA10_AND_BETA11_ROADMAP_CHECKLIST.md"
      - "docs/RELEASE_START_NOTEBOOK.md"
      - "docs/RELEASE_FAILURE_NOTEBOOK.md"
      - "scripts/beta8-*.js"
      - "scripts/beta8-*.sh"
      - "scripts/build-beta8-package.sh"
      - "scripts/beta7-*.js"
      - "scripts/build-beta7-package.js"
      - "scripts/beta6-l6-hetzner-generation-gate.js"
      - ".github/workflows/release-train-dry-run.yml"
      - "package.json"
      - "CHANGELOG.md"
      - "README.md"
      - "docs/BETA8_RELEASE_PLAN.md"
      - "docs/GITHUB_SIGNING_KEY_RUNBOOK.md"
      - "pcd/**"
      - "engines/l4plus-n5/**"
      - "docs/BETA7_RELEASE_PLAN.md"
      - "docs/BETA6_RELEASE_PLAN.md"
      - "docs/BETA6_L6_HETZNER_GENERATION_ENDPOINT.md"
      - "evidence/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dry-run:
    name: Validate manifest and release train
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install dependencies when lockfile exists
        shell: bash
        run: |
          set -euo pipefail
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install --ignore-scripts --no-package-lock
          fi

      - name: Release train dry run
        env:
          GH_TOKEN: ${{ github.token }}
        run: npm run release:train:dry-run

      - name: Upload dry-run evidence
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: release-train-dry-run
          path: |
            evidence/release-manifest-validate/report.json
            evidence/release-train-dry-run/report.json
